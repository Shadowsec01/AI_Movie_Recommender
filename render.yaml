# render.yaml
# ─────────────────────────────────────────────────────────────────────────────
# CineMatch — Render Deployment Blueprint
# ─────────────────────────────────────────────────────────────────────────────
# HOW TO DEPLOY (one-time setup):
#   1. Push this repo to GitHub / GitLab.
#   2. Go to https://dashboard.render.com → "New" → "Blueprint".
#   3. Connect your repo. Render auto-detects this file and creates both services.
#   4. Both services will build. The backend URL is:
#        https://cinematch-api.onrender.com
#      If Render renames it (e.g. cinematch-api-xxxx), copy the real URL.
#   5. In the Render dashboard → cinematch-web → Environment → edit VITE_API_URL
#      to match your actual backend URL, then click "Manual Deploy".
#
# Free-tier note:
#   Free Web Services spin down after 15 min of inactivity.
#   First request after sleep can take ~30 s. Upgrade to Starter ($7/mo) for always-on.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── BACKEND: Flask API ────────────────────────────────────────────────────
  - type: web
    name: cinematch-api
    runtime: python
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: FLASK_ENV
        value: production
    healthCheckPath: /api/health

  # ── FRONTEND: React / Vite Static Site ───────────────────────────────────
  - type: web
    name: cinematch-web
    runtime: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: "no-cache"
    routes:
      # SPA fallback — all routes serve index.html
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      # ⚠️  IMPORTANT: After first deploy, update this to your real backend URL.
      # It MUST be set before the frontend builds (Vite bakes it in at build time).
      # Format: https://<your-backend-service-name>.onrender.com/api
      - key: VITE_API_URL
        value: https://cinematch-api.onrender.com/api
